<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Munees | Mechanical Engineer</title>

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

/* BODY */
body {
    background: #0f172a;
    color: white;
    scroll-behavior: smooth;
}

/* NAVBAR */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    background: #020617;
    padding: 15px;
    text-align: center;
    z-index: 1000;
}

nav a {
    color: white;
    margin: 15px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    color: #38bdf8;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    flex-direction: column;
    animation: fadeIn 2s;
}

.hero h1 {
    font-size: 50px;
    color: #38bdf8;
}

.hero p {
    margin-top: 10px;
}

/* SECTION */
.section {
    padding: 80px 20px;
    text-align: center;
    opacity: 0;
    transform: translateY(50px);
    transition: 1s;
}

.section.show {
    opacity: 1;
    transform: translateY(0);
}

/* SKILLS */
.skill {
    display: inline-block;
    background: #1e293b;
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
    transition: 0.3s;
}

.skill:hover {
    background: #38bdf8;
    color: black;
}

/* CONTACT */
button {
    padding: 10px 20px;
    background: #38bdf8;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#skills">Skills</a>
<a href="#contact">Contact</a>
</nav>

<!-- HERO -->
<div class="hero" id="home">
<h1>Munees</h1>
<p>Mechanical Engineering Student | Future Design Engineer</p>
</div>

<!-- ABOUT -->
<div class="section" id="about">
<h2>About Me</h2>
<p>I am a 2nd year Mechanical Engineering student passionate about CAD and design.</p>
</div>

<!-- SKILLS -->
<div class="section" id="skills">
<h2>Skills</h2>
<div class="skill">CAD</div>
<div class="skill">C Programming</div>
<div class="skill">Machine Operation</div>
</div>

<!-- CONTACT -->
<div class="section" id="contact">
<h2>Contact</h2>
<p>📞 9360441259</p>
<p>📧 muneesvenkat8@gmail.com</p>
<button onclick="alert('Email: muneesvenkat8@gmail.com')">Contact Me</button>
</div>

<script>

/* SCROLL ANIMATION */
const sections = document.querySelectorAll('.section');

window.addEventListener('scroll', () => {
    sections.forEach(sec => {
        const top = window.scrollY;
        const offset = sec.offsetTop - 400;

        if(top > offset){
            sec.classList.add('show');
        }
    });
});

</script>

</body>
  </html>
