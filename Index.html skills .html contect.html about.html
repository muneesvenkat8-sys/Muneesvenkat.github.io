<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Munees | Portfolio</title>

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

/* BODY */
body {
    background: #0f172a;
    color: white;
    overflow-x: hidden;
}

/* NAVBAR */
nav {
    position: fixed;
    width: 100%;
    background: rgba(2,6,23,0.9);
    padding: 15px;
    text-align: center;
    backdrop-filter: blur(10px);
    z-index: 1000;
}

nav a {
    color: white;
    margin: 15px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

nav a:hover {
    color: #38bdf8;
}

/* PAGE STYLE */
.page {
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
    text-align: center;
    flex-direction: column;
    animation: fade 0.6s;
}

.page.active {
    display: flex;
}

/* HERO */
h1 {
    font-size: 50px;
    color: #38bdf8;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    background: #38bdf8;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* SKILLS */
.skill {
    background: #1e293b;
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
    display: inline-block;
    transition: 0.3s;
}

.skill:hover {
    background: #38bdf8;
    color: black;
}

/* ANIMATION */
@keyframes fade {
    from {opacity: 0;}
    to {opacity: 1;}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('about')">About</a>
<a onclick="showPage('skills')">Skills</a>
<a onclick="showPage('contact')">Contact</a>
</nav>

<!-- HOME -->
<div class="page active" id="home">
<h1>Munees</h1>
<p>Mechanical Engineering Student</p>
<button onclick="showPage('about')">Explore</button>
</div>

<!-- ABOUT -->
<div class="page" id="about">
<h1>About Me</h1>
<p>I am a 2nd year Mechanical Engineering student passionate about CAD design.</p>
</div>

<!-- SKILLS -->
<div class="page" id="skills">
<h1>Skills</h1>
<div>
<span class="skill">CAD</span>
<span class="skill">C Programming</span>
<span class="skill">Machine Operation</span>
</div>
</div>

<!-- CONTACT -->
<div class="page" id="contact">
<h1>Contact</h1>
<p>📞 9360441259</p>
<p>📧 muneesvenkat8@gmail.com</p>
</div>

<script>

function showPage(pageId){
    let pages = document.querySelectorAll('.page');
    pages.forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
}

</script>

</body>
</html>
